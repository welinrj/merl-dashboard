version: '3.8'

services:

  # ---------------------------------------------------------------------------
  # NGINX — Reverse proxy / TLS termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: merl-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
      - superset
    restart: unless-stopped
    networks:
      - merl-net

  # ---------------------------------------------------------------------------
  # POSTGRES — Primary transactional database (PostGIS enabled)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: merl-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/postgres/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - merl-net

  # ---------------------------------------------------------------------------
  # CLICKHOUSE — Columnar analytics database
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.2-alpine
    container_name: merl-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./database/clickhouse/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/clickhouse/materialized_views.sql:/docker-entrypoint-initdb.d/02-mv.sql:ro
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --host localhost --query 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    networks:
      - merl-net

  # ---------------------------------------------------------------------------
  # PEERDB — Postgres → ClickHouse CDC replication
  # ---------------------------------------------------------------------------
  peerdb:
    image: ghcr.io/peerdb-io/peerdb:stable
    container_name: merl-peerdb
    environment:
      PEERDB_PASSWORD: ${PEERDB_PASSWORD}
      CATALOG_HOST: postgres
      CATALOG_PORT: 5432
      CATALOG_USER: ${POSTGRES_USER}
      CATALOG_PASSWORD: ${POSTGRES_PASSWORD}
      CATALOG_DATABASE: ${POSTGRES_DB}
    volumes:
      - ./peerdb/config.json:/config/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "8085:8085"
    restart: unless-stopped
    networks:
      - merl-net

  # ---------------------------------------------------------------------------
  # BACKEND — FastAPI application server
  # ---------------------------------------------------------------------------
  backend:
    build: ./backend
    image: ghcr.io/welinrj/merl-dashboard/merl-backend:latest
    container_name: merl-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${BACKEND_SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - merl-net

  # ---------------------------------------------------------------------------
  # FRONTEND — React / Vite SPA
  # ---------------------------------------------------------------------------
  frontend:
    build: ./frontend
    image: ghcr.io/welinrj/merl-dashboard/merl-frontend:latest
    container_name: merl-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost/auth}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - merl-net

  # ---------------------------------------------------------------------------
  # AIRFLOW — Workflow orchestration (backup, ETL, reporting jobs)
  # ---------------------------------------------------------------------------
  airflow:
    build: ./airflow
    image: ghcr.io/welinrj/merl-dashboard/merl-airflow:latest
    container_name: merl-airflow
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/1
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost/airflow
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "true"
      # Application env vars available to DAGs
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-southeast-2}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      ALERT_EMAIL: ${ALERT_EMAIL}
    volumes:
      - airflow_logs:/opt/airflow/logs
      - ./airflow/dags:/opt/airflow/dags:ro
      - backups_data:/opt/airflow/backups
    ports:
      - "8080:8080"
    command: ["airflow", "standalone"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - merl-net

  # ---------------------------------------------------------------------------
  # SUPERSET — Analytics / BI dashboard layer
  # ---------------------------------------------------------------------------
  superset:
    image: apache/superset:3.1.0
    container_name: merl-superset
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/2
      SUPERSET_WEBSERVER_TIMEOUT: 300
      GUNICORN_TIMEOUT: 300
    volumes:
      - superset_data:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    ports:
      - "8088:8088"
    command:
      - /bin/sh
      - -c
      - |
        superset db upgrade &&
        superset fab create-admin \
          --username "${SUPERSET_ADMIN_USER:-admin}" \
          --firstname "MERL" \
          --lastname "Admin" \
          --email "${SUPERSET_ADMIN_EMAIL:-admin@merl.gov.vu}" \
          --password "${SUPERSET_ADMIN_PASSWORD:-admin}" || true &&
        superset init &&
        gunicorn \
          --bind 0.0.0.0:8088 \
          --workers 4 \
          --worker-class gthread \
          --threads 2 \
          --timeout 300 \
          --limit-request-line 0 \
          --limit-request-field_size 0 \
          "superset.app:create_app()"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - merl-net

  # ---------------------------------------------------------------------------
  # KEYCLOAK — Identity and access management
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: merl-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: ["start-dev"]
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - merl-net

  # ---------------------------------------------------------------------------
  # REDIS — Message broker and cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: merl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - merl-net

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  uploads_data:
    driver: local
  airflow_logs:
    driver: local
  superset_data:
    driver: local
  redis_data:
    driver: local
  backups_data:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  merl-net:
    driver: bridge

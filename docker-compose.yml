# =============================================================================
# DoCC M&E Monitoring Platform (DMP) — Production Deployment Stack
# Project : Vanuatu Loss and Damage Fund Development Project
# Target  : Vanuatu Government server (Ubuntu 22.04 LTS + Docker Engine)
# =============================================================================
#
# This compose file runs the DMP application tier:
#
#   ┌──────────────────────── Government server ────────────────────────┐
#   │                                                                   │
#   │   proxy (nginx :80/:443, TLS termination)                         │
#   │     ├── /            → frontend (React SPA, nginx :3000)          │
#   │     └── api.<domain> → supabase-kong:8000 (self-hosted Supabase)  │
#   │                                                                   │
#   └───────────────────────────────────────────────────────────────────┘
#
# The Supabase backend (PostgreSQL 15 + PostGIS, Auth, Storage, Realtime,
# PostgREST) is deployed as its OWN compose project from the official
# supabase/docker distribution, joined to this stack via the shared
# external network `dmp-net`. See docs/migration-runbook.md for the full
# step-by-step procedure, including database restore and TLS setup.
#
# Quick start (after completing the runbook prerequisites):
#   docker network create dmp-net        # once, before either stack starts
#   docker compose up -d --build
# =============================================================================

name: docc-dmp

services:
  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the static bundle at build time — set these in .env.
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_APP_ENV: production
    container_name: dmp-frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - dmp-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3

  proxy:
    image: nginx:1.27-alpine
    container_name: dmp-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - dmp-net

  # Renews Let's Encrypt certificates. If the Government server has no
  # outbound internet access, remove this service and install an internally
  # issued certificate instead (see migration runbook §8).
  certbot:
    image: certbot/certbot:latest
    container_name: dmp-certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c 'trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!}; done'

volumes:
  certbot_certs:
  certbot_webroot:

networks:
  dmp-net:
    name: dmp-net
    external: true

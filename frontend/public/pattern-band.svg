<svg xmlns="http://www.w3.org/2000/svg" width="56" height="26" viewBox="0 0 56 26">
  <!-- Ni-Vanuatu weaving / sandroing-inspired border band. Tiles horizontally.
       A row of interlocking diamonds (pandanus weave) linked by namele-fern
       chevrons, framed by two fine rails. currentColor lets callers tint it. -->
  <g fill="none" stroke="#4f46e5" stroke-width="1.3" stroke-linejoin="round" stroke-linecap="round" opacity="0.5">
    <path d="M0 3 H56 M0 23 H56" stroke-width="0.9"/>
    <!-- central diamond -->
    <path d="M28 6 L38 13 L28 20 L18 13 Z"/>
    <path d="M28 10.2 L31.8 13 L28 15.8 L24.2 13 Z"/>
    <!-- connectors -->
    <path d="M4 13 H18 M38 13 H52"/>
    <!-- edge half-diamonds (meet the next tile) -->
    <path d="M0 13 L4 9.4 M0 13 L4 16.6"/>
    <path d="M56 13 L52 9.4 M56 13 L52 16.6"/>
    <!-- small flanking chevrons -->
    <path d="M9 10.5 L12 13 L9 15.5"/>
    <path d="M47 10.5 L44 13 L47 15.5"/>
  </g>
  <circle cx="28" cy="13" r="1.3" fill="#4f46e5" opacity="0.5"/>
</svg>

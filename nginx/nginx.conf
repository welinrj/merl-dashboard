# =============================================================================
# nginx.conf — DoCC M&E Monitoring Platform (DMP) Reverse Proxy
# Project: Vanuatu Loss and Damage Fund Development Project
# =============================================================================
#
# Upstream layout:
#   frontend       :3000   React SPA served by nginx (dmp-frontend container)
#   supabase-kong  :8000   Self-hosted Supabase API gateway (separate compose
#                          project on the shared `dmp-net` network)
#
# Domains (replace before deployment — see docs/migration-runbook.md §4):
#   dmp.gov.vu       → frontend
#   api.dmp.gov.vu   → Supabase (Auth, REST, Realtime, Storage)
#
# TLS: certificates are provisioned into the `certbot_certs` volume either by
# the certbot service (Let's Encrypt, requires outbound internet) or by
# manually installing Government-issued certificates (runbook §8.2).
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;

    # Uploads (CSV/XLSX datasets, photos, PDF evidence) go through Supabase
    # Storage on the api host; 50 MB matches the application-level limit.
    client_max_body_size 50m;

    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_types         text/plain text/css application/json application/javascript
                       application/geo+json image/svg+xml;

    upstream frontend {
        server dmp-frontend:3000;
    }

    # Redis-backed caching sidecar (shared aggregate results).
    upstream cache_service {
        server dmp-cache:8080;
    }

    # Supabase API gateway (Kong) from the self-hosted Supabase compose
    # project. The container name is defined in supabase/docker/.env
    # (KONG_HTTP_PORT). Both stacks share the external `dmp-net` network.
    upstream supabase {
        server supabase-kong:8000;
    }

    # ── HTTP: ACME challenges + redirect everything else to HTTPS ───────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: application (dmp.gov.vu) ──────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name dmp.gov.vu;                       # CHANGE to final domain

        ssl_certificate     /etc/letsencrypt/live/dmp.gov.vu/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dmp.gov.vu/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Cached shared aggregates (served from Redis via the sidecar). Same
        # origin as the app, so the browser needs no CORS or extra host.
        location /api-cache/ {
            proxy_pass         http://cache_service/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── HTTPS: Supabase API (api.dmp.gov.vu) ─────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name api.dmp.gov.vu;                   # CHANGE to final domain

        ssl_certificate     /etc/letsencrypt/live/dmp.gov.vu/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dmp.gov.vu/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass         http://supabase;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Supabase Realtime uses WebSockets.
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}

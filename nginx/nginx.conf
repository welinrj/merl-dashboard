# =============================================================================
# nginx.conf — MERL Dashboard Reverse Proxy
# Project: Vanuatu Loss and Damage Fund Development Project
# =============================================================================
#
# Upstream layout:
#   frontend  :3000  (Next.js)
#   backend   :8000  (FastAPI)
#   superset  :8088  (Apache Superset)
#   airflow   :8080  (Apache Airflow)
#   keycloak  :8180  (Keycloak IAM)
#
# To activate HTTPS:
#   1. Obtain certificates (Let's Encrypt via certbot, or copy PEM files).
#   2. Uncomment the HTTPS server block at the bottom of this file.
#   3. Uncomment the HTTP→HTTPS redirect in the port-80 server block.
#   4. Remove (or keep) the plain-HTTP server block for the redirect only.
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct=$upstream_connect_time '
                      'uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    server_tokens       off;   # Do not reveal Nginx version in headers

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     1024;
    gzip_buffers        16 8k;
    gzip_http_version   1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # -------------------------------------------------------------------------
    # Upload / body size
    # -------------------------------------------------------------------------
    client_max_body_size   100m;
    client_body_timeout    120s;
    client_header_timeout  30s;

    # -------------------------------------------------------------------------
    # Proxy global defaults
    # -------------------------------------------------------------------------
    proxy_http_version          1.1;
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_connect_timeout       15s;
    proxy_send_timeout          300s;
    proxy_read_timeout          300s;
    proxy_buffering             on;
    proxy_buffer_size           16k;
    proxy_buffers               8 32k;
    proxy_busy_buffers_size     64k;
    proxy_temp_file_write_size  64k;

    # -------------------------------------------------------------------------
    # Upstream definitions
    # -------------------------------------------------------------------------
    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream superset {
        server superset:8088;
        keepalive 16;
    }

    upstream airflow {
        server airflow-webserver:8080;
        keepalive 8;
    }

    upstream keycloak {
        server keycloak:8180;
        keepalive 8;
    }

    # -------------------------------------------------------------------------
    # Rate limiting zones
    # -------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # -------------------------------------------------------------------------
    # HTTP server — port 80
    # In development: serves traffic directly (no HTTPS).
    # In production: uncomment the redirect below and activate the HTTPS block.
    # -------------------------------------------------------------------------
    server {
        listen       80;
        server_name  _;

        # --- Production: redirect all HTTP traffic to HTTPS ---
        # Uncomment the two lines below and remove the location blocks
        # in this server block once SSL is active.
        #
        # return 301 https://$host$request_uri;
        # -------------------------------------------------------

        # Let's Encrypt ACME challenge path (keep accessible even after enabling HTTPS redirect)
        location /.well-known/acme-challenge/ {
            root   /var/www/certbot;
            try_files $uri =404;
        }

        # --- Frontend (Next.js) ---
        location / {
            proxy_pass http://frontend;

            # WebSocket support for HMR in development
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- Backend API (FastAPI) ---
        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;
            limit_conn conn_limit 50;

            proxy_pass http://backend/api/;

            # WebSocket support (for real-time events if implemented)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $http_connection;

            # Longer timeouts for long-running API operations (exports, etc.)
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;

            # Pass the original content-type for file uploads
            proxy_set_header Content-Type $content_type;
        }

        # Static file uploads served directly by Nginx for performance
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff;
        }

        # --- Apache Superset ---
        location /superset/ {
            proxy_pass http://superset/;

            # Superset requires cookies across sub-paths
            proxy_cookie_path / /superset/;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # Required for Superset's CSRF to work behind a proxy
            proxy_set_header X-Forwarded-Prefix /superset;
        }

        # Superset static assets (WebSockets used by async queries)
        location /superset/static/ {
            proxy_pass http://superset/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # --- Apache Airflow ---
        location /airflow/ {
            proxy_pass http://airflow/airflow/;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # Airflow expects the base URL to be set
            proxy_set_header X-Forwarded-Prefix /airflow;
        }

        # --- Keycloak ---
        location /auth/ {
            limit_req zone=auth_limit burst=20 nodelay;

            proxy_pass http://keycloak/auth/;

            proxy_buffer_size     128k;
            proxy_buffers         4 256k;
            proxy_busy_buffers_size 256k;

            proxy_read_timeout    120s;
            proxy_send_timeout    120s;
        }

        # --- Security headers (applied on HTTP; also present on HTTPS block) ---
        add_header X-Content-Type-Options    "nosniff"         always;
        add_header X-Frame-Options           "SAMEORIGIN"      always;
        add_header X-XSS-Protection          "1; mode=block"   always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    }


